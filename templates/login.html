{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Login</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="block text-sm font-medium">Username</label>
            <input type="text" name="username" required class="w-full border rounded px-3 py-2">
        </div>
        <div class="mb-3">
            <label class="block text-sm font-medium">Password</label>
            <input type="password" name="password" required class="w-full border rounded px-3 py-2">
        </div>
        <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Login</button>
    </form>
</div>
{% endblock %}
