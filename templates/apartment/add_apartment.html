{% extends "base.html" %}
{% block title %}Add Apartment{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-primary-600 to-primary-800 p-6 text-center text-white">
            <i class="fas fa-door-open text-4xl mb-2"></i>
            <h2 class="text-2xl font-bold">Add New Apartment</h2>
            <p class="text-primary-200 text-sm">Register a new apartment unit</p>
        </div>
        <form method="POST" class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Unit No <span class="text-red-500">*</span></label>
                    <input name="unit_no" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Floor</label>
                    <input name="floor" type="number" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Owner Name</label>
                <input name="owner_name" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Owner Phone</label>
                    <input name="owner_phone" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Owner Email</label>
                    <input name="owner_email" type="email" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition">
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button class="flex-1 bg-gradient-to-r from-primary-600 to-primary-700 text-white py-2.5 rounded-xl font-medium hover:from-primary-700 hover:to-primary-800 transition shadow-lg shadow-primary-500/25">
                    <i class="fas fa-save mr-2"></i>Save Apartment
                </button>
                <a href="{{ url_for('apartment.index') }}" class="px-6 py-2.5 border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
