{% extends "base.html" %}
{% block title %}Edit Apartment{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-warm-500 to-warm-700 p-6 text-center text-white">
            <i class="fas fa-edit text-4xl mb-2"></i>
            <h2 class="text-2xl font-bold">Edit Apartment {{ apartment.unit_no }}</h2>
        </div>
        <form method="POST" class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Unit No</label>
                    <input name="unit_no" value="{{ apartment.unit_no }}" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-warm-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Floor</label>
                    <input name="floor" type="number" value="{{ apartment.floor or '' }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-warm-500 outline-none transition">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Owner Name</label>
                <input name="owner_name" value="{{ apartment.owner_name or '' }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-warm-500 outline-none transition">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Owner Phone</label>
                    <input name="owner_phone" value="{{ apartment.owner_phone or '' }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-warm-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Owner Email</label>
                    <input name="owner_email" value="{{ apartment.owner_email or '' }}" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-warm-500 outline-none transition">
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button class="flex-1 bg-gradient-to-r from-warm-500 to-warm-600 text-white py-2.5 rounded-xl font-medium hover:from-warm-600 hover:to-warm-700 transition shadow-lg shadow-warm-500/25">
                    <i class="fas fa-save mr-2"></i>Update
                </button>
                <a href="{{ url_for('apartment.index') }}" class="px-6 py-2.5 border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
