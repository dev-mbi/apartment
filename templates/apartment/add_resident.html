{% extends "base.html" %}
{% block title %}Add Resident{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-gray-900 rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-accent-500 to-emerald-600 p-6 text-center text-white">
            <i class="fas fa-user-plus text-4xl mb-2"></i>
            <h2 class="text-2xl font-bold">Add Resident</h2>
            <p class="text-white/80 text-sm">Assign a user to {{ apartment.unit_no }}</p>
        </div>
        <form method="POST" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-200 mb-1">User</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-3 text-gray-500"></i>
                    <select name="user_id" required class="w-full pl-10 pr-4 py-2.5 border border-gray-600 rounded-lg focus:ring-2 focus:ring-accent-500 outline-none appearance-none bg-gray-800">
                        {% for u in users %}
                        <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-200 mb-1">Phone</label>
                <div class="relative">
                    <i class="fas fa-phone absolute left-3 top-3 text-gray-500"></i>
                    <input name="phone" class="w-full pl-10 pr-4 py-2.5 border border-gray-600 rounded-lg focus:ring-2 focus:ring-accent-500 outline-none transition">
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button class="flex-1 bg-gradient-to-r from-accent-500 to-emerald-600 text-white py-2.5 rounded-xl font-medium hover:from-accent-600 hover:to-emerald-700 transition shadow-lg shadow-accent-500/25">
                    <i class="fas fa-save mr-2"></i>Add Resident
                </button>
                <a href="{{ url_for('apartment.view_apartment', apt_id=apartment.id) }}" class="px-6 py-2.5 border border-gray-600 rounded-xl text-gray-300 hover:bg-gray-800 transition">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
