{% extends "base.html" %}
{% block title %}Add Resident{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Add Resident to {{ apartment.unit_no }}</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="block text-sm font-medium">User</label>
            <select name="user_id" required class="w-full border rounded px-3 py-2">
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3"><label class="block text-sm font-medium">Phone</label><input name="phone" class="w-full border rounded px-3 py-2"></div>
        <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add</button>
    </form>
</div>
{% endblock %}
