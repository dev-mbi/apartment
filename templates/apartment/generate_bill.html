{% extends "base.html" %}
{% block title %}Generate Bills{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-6">
        <a href="{{ url_for('apartment.bills') }}" class="text-gray-400 hover:text-gray-200 transition"><i class="fas fa-arrow-left"></i></a>
        <div>
            <h1 class="text-2xl font-bold text-gray-100">Generate Maintenance Bills</h1>
            <p class="text-gray-400 text-sm">Create monthly bills for all apartments</p>
        </div>
    </div>

    <div class="bg-gray-900 rounded-xl shadow-sm border border-gray-800 overflow-hidden">
        <div class="bg-gradient-to-r from-primary-500 to-primary-700 px-5 py-3">
            <h2 class="font-semibold text-white"><i class="fas fa-file-invoice mr-2"></i>Bill Details</h2>
        </div>
        <div class="p-6">
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Month <span class="text-red-400">*</span></label>
                    <input type="month" name="month" value="{{ month or '' }}" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-200 focus:ring-2 focus:ring-primary-500 outline-none">
                    <p class="text-xs text-gray-500 mt-1">e.g. 2026-07</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Maintenance Amount <span class="text-red-400">*</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-2.5 text-gray-400">PKR</span>
                        <input type="number" step="0.01" name="amount" value="{{ amount or '' }}" required class="w-full pl-12 pr-4 py-2.5 bg-gray-800 border border-gray-600 rounded-lg text-gray-200 focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Late Fee</label>
                    <div class="relative">
                        <span class="absolute left-3 top-2.5 text-gray-400">PKR</span>
                        <input type="number" step="0.01" name="late_fee" value="{{ late_fee or 0 }}" class="w-full pl-12 pr-4 py-2.5 bg-gray-800 border border-gray-600 rounded-lg text-gray-200 focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Due Date <span class="text-red-400">*</span></label>
                    <input type="date" name="due_date" value="{{ due_date or '' }}" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-gray-200 focus:ring-2 focus:ring-primary-500 outline-none">
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="submit" class="bg-gradient-to-r from-primary-600 to-primary-700 text-white px-6 py-2.5 rounded-xl font-medium hover:from-primary-700 hover:to-primary-800 transition shadow-lg shadow-primary-500/25">
                        <i class="fas fa-file-invoice mr-2"></i> Generate Bills
                    </button>
                    <a href="{{ url_for('apartment.bills') }}" class="bg-gray-800 text-gray-300 px-6 py-2.5 rounded-xl font-medium hover:bg-gray-700 transition border border-gray-700">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
