{% extends "base.html" %}
{% block title %}Edit Donation{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Edit Donation</h2>
    <form method="POST">
        <div class="mb-3"><label class="block text-sm font-medium">Amount (PKR)</label><input name="amount" type="number" step="0.01" value="{{ donation.amount }}" required class="w-full border rounded px-3 py-2"></div>
        <div class="mb-3"><label class="block text-sm font-medium">Note (optional)</label><input name="note" value="{{ donation.note or '' }}" class="w-full border rounded px-3 py-2"></div>
        <button class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Update</button>
        <a href="{{ url_for('masjid.index') }}" class="ml-2 text-gray-600">Cancel</a>
    </form>
</div>
{% endblock %}
