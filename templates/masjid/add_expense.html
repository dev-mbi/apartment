{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-gray-900 p-6 rounded shadow text-gray-100">
    <h2 class="text-2xl font-bold mb-4">Record Expense</h2>
    <form method="POST">
        <div class="mb-3"><label class="block text-sm font-medium text-gray-300">Amount (PKR )</label><input name="amount" type="number" step="0.01" required class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-800 text-gray-100"></div>
        <div class="mb-3"><label class="block text-sm font-medium text-gray-300">Category</label>
            <select name="category" required class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-800 text-gray-100">
                <option value="Electricity">Electricity</option>
                <option value="Water">Water</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Salary">Salary</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="mb-3"><label class="block text-sm font-medium text-gray-300">Description</label><textarea name="description" class="w-full border border-gray-600 rounded px-3 py-2 bg-gray-800 text-gray-100"></textarea></div>
        <button class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Record</button>
        <a href="{{ url_for('masjid.index') }}" class="ml-2 text-gray-300">Cancel</a>
    </form>
</div>
{% endblock %}
