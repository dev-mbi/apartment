{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Record Expense</h2>
    <form method="POST">
        <div class="mb-3"><label class="block text-sm font-medium">Amount (₹)</label><input name="amount" type="number" step="0.01" required class="w-full border rounded px-3 py-2"></div>
        <div class="mb-3"><label class="block text-sm font-medium">Category</label>
            <select name="category" required class="w-full border rounded px-3 py-2">
                <option value="Electricity">Electricity</option>
                <option value="Water">Water</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Salary">Salary</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="mb-3"><label class="block text-sm font-medium">Description</label><textarea name="description" class="w-full border rounded px-3 py-2"></textarea></div>
        <button class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Record</button>
        <a href="{{ url_for('masjid.index') }}" class="ml-2 text-gray-600">Cancel</a>
    </form>
</div>
{% endblock %}
