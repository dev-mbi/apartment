{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Edit Expense</h2>
    <form method="POST">
        <div class="mb-3"><label class="block text-sm font-medium">Amount (PKR)</label><input name="amount" type="number" step="0.01" value="{{ expense.amount }}" required class="w-full border rounded px-3 py-2"></div>
        <div class="mb-3"><label class="block text-sm font-medium">Category</label>
            <select name="category" required class="w-full border rounded px-3 py-2">
                {% for cat in ['Electricity', 'Water', 'Cleaning', 'Maintenance', 'Salary', 'Other'] %}
                <option value="{{ cat }}" {{ 'selected' if cat == expense.category }}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3"><label class="block text-sm font-medium">Description</label><textarea name="description" class="w-full border rounded px-3 py-2">{{ expense.description or '' }}</textarea></div>
        <button class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Update</button>
        <a href="{{ url_for('masjid.index') }}" class="ml-2 text-gray-600">Cancel</a>
    </form>
</div>
{% endblock %}
