name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install JS deps & build CSS
        run: |
          npm install
          npm run build:css

      - name: Lint with ruff
        run: python -m ruff check . --ignore=E402,F401 --exit-zero

      - name: Test app import
        run: python3 scripts/test_import.py

      - name: Run tests
        run: python -m pytest tests/ -v
